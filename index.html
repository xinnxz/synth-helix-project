<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>SYNTH::HELIX | Interactive Light Beam Music Instrument</title>
    <meta name="description" content="SYNTH::HELIX is an immersive 3D light beam synthesizer. Create music by sweeping through neon beams in a cyberpunk environment. Professional audio with customizable scales, effects, and themes." />
    <meta name="keywords" content="synth helix, synthesizer, music instrument, 3D music, light beam, cyberpunk, interactive music, web audio, three.js" />
    <meta name="author" content="SYNTH::HELIX" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SYNTH::HELIX | Interactive Light Beam Music Instrument" />
    <meta property="og:description" content="Create music by sweeping through neon light beams in an immersive 3D cyberpunk environment." />
    <meta property="og:image" content="/assets/og-image.jpg" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SYNTH::HELIX" />
    <meta name="twitter:description" content="Interactive 3D Light Beam Music Instrument" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎹</text></svg>" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  
  <body>
    <!-- 3D Canvas Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui">
      <button id="start-btn" class="glow-pulse">INITIALIZE SYSTEM</button>
      <div id="overlay-text" class="hidden">
        SWEEP MOUSE TO PLAY // CLICK & HOLD FOR BASS // PRESS [S] FOR SETTINGS
      </div>
    </div>

    <!-- Branding -->
    <div id="branding" class="hidden">
      <h1>SYNTH::HELIX</h1>
      <div class="tagline">LIGHT BEAM SYNTHESIZER</div>
    </div>

    <!-- Settings Button -->
    <button id="settings-btn" class="hidden" title="Settings (S)">⚙</button>

    <!-- Module Scripts -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>

    <!-- Main Application -->
    <script type="module" src="js/main.js"></script>
    
    <!-- Show branding & settings after load -->
    <script>
      document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('branding').classList.remove('hidden');
        document.getElementById('settings-btn').classList.remove('hidden');
      });
      
      document.getElementById('settings-btn').addEventListener('click', () => {
        const panel = document.getElementById('controls-panel');
        if (panel) panel.classList.toggle('visible');
      });
    </script>
  </body>
</html>
